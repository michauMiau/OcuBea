name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin $ANDROID_HOME/licenses
        cd /tmp
        wget https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv $PWD/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        rmdir $PWD/cmdline-tools 2>/dev/null || true
        # Pre-accept all licenses by writing them directly
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo "84831b9409646a975e0e3d7c01d7727c63fcd223" >> $ANDROID_HOME/licenses/android-sdk-cmake-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        # Install platform and build-tools
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;37.0.0"
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython kivy[full]
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sztreamerr-apk
        path: bin/*.apk
        if-no-files-found: error
