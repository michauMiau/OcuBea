name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/build-apk.yml'
      - 'buildozer.spec'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/build-apk.yml'
      - 'buildozer.spec'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ACCEPT_LICENSES: "true"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
          src/
          buildozer.spec
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin
        cd /tmp
        wget https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv $PWD/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        rmdir $PWD/cmdline-tools 2>/dev/null || true
    
    - name: Accept Android licenses
      uses: SimonMarquis/android-accept-licenses@v1
    
    - name: Install SDK packages
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platforms;android-34" "build-tools;37.0.0" "ndk;23.1.7779620"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Buildozer deps
      run: |
        sudo apt-get update && sudo apt-get install -y python3-dev build-essential git zip unzip libtool autoconf automake pkg-config libltdl-dev
        pip install --user cython buildozer kivy pillow pyjnius requests aiohttp
        export PATH="$HOME/.local/bin:$PATH"
    
    - name: Build APK
      env:
        CFLAGS: "-Wno-error=implicit-function-declaration -Wno-error=deprecated-declarations"
        LDFLAGS: "-Wno-error=implicit-function-declaration"
      run: |
        cp -f src/main.py .
        
        # Patch SDL2's ALooper_pollAll -> pollOnce (deprecation fix)
        if [ -d "$HOME/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL/src" ]; then
          find $HOME/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL/src -name '*.c' | xargs sed -i 's/ALooper_pollAll(/ALooper_pollOnce(/g'
        fi
        cd $GITHUB_WORKSPACE
        yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sztreamerr-apk
        path: bin/*.apk
        if-no-files-found: error
